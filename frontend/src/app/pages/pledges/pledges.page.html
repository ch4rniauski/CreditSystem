    <h1>Залог</h1>
    <p class="hint">Редактирование только для договоров «Оформляется».</p>
    <section class="panel">
      <label class="block"
        >Договор
        <select [value]="selectedContractId()" (change)="pickContract(+$any($event.target).value)">
          @for (c of draftContracts(); track c.id) {
            <option [value]="c.id">{{ c.creditName }} — {{ contractClientLabel(c) }}</option>
          }
        </select>
      </label>

      <form [formGroup]="form" (ngSubmit)="add()" class="form-grid">
        <label>Имущество <input formControlName="propertyName" /></label>
        <label>Оценка <input type="number" formControlName="estimatedValue" /></label>
        <label>Дата оценки <input type="date" formControlName="assessmentDate" /></label>
        <label
          >Тип
          <select formControlName="propertyType">
            <option value="real_estate">Недвижимость</option>
            <option value="vehicle">Автотранспорт</option>
            <option value="equipment">Оборудование</option>
                  <label
                    >Валюта
                    <select formControlName="currencyId">
                      @for (c of currencies(); track c.id) {
                        <option [value]="c.id">{{ c.code }}</option>
                      }
                    </select>
                  </label>
          </select>
        </label>
        <button type="submit" [disabled]="form.invalid || selectedContractId() === 0">Добавить</button>
      </form>

      @if (error()) {
        <p class="err">{{ error() }}</p>
      }
    </section>

    <table>
      <thead>
        <tr>
          <th>Имущество</th>
          <th>Стоимость</th>
          <th>Тип</th>
                    <th>Валюта</th>
          <th>Действие</th>
        </tr>
      </thead>
      <tbody>
        @for (p of pledges(); track p.internalId) {
          <tr>
            <td>{{ p.propertyName }}</td>
            <td>{{ p.estimatedValue }}</td>
            <td>{{ pledgeTypeLabel(p.propertyType) }}</td>
            <td>{{ p.currencyCode }}</td>
            <td><button type="button" (click)="remove(p)">Удалить</button></td>
          </tr>
        }
      </tbody>
    </table>
