    <h1>Платежи по кредиту</h1>
    <section class="panel">
      <label class="block"
        >Договор (оформлен)
        <select [value]="contractId()" (change)="setContract(+$any($event.target).value)">
          @for (c of signedContracts(); track c.id) {
            <option [value]="c.id">{{ c.creditName }} — {{ c.clientDisplay }} (остаток {{ c.remainingPrincipal }})</option>
          }
        </select>
      </label>

      <form [formGroup]="form" (ngSubmit)="submit()" class="form-inline">
        <label>Дата платежа <input type="date" formControlName="paymentDate" /></label>
        <label>Сумма <input type="number" step="0.01" formControlName="totalAmount" /></label>
        <button type="submit" [disabled]="form.invalid || contractId() === 0">Внести</button>
      </form>

      @if (error()) {
        <p class="err">{{ error() }}</p>
      }
    </section>
