    <h1>Ставки рефинансирования НБРБ</h1>
    <section class="panel">
      <form [formGroup]="form" (ngSubmit)="add()" class="form-grid">
        <label>С даты <input type="date" formControlName="validFromDate" /></label>
        <label>По дату <input type="date" formControlName="validToDate" /></label>
        <label>Ставка (доля) <input type="number" step="0.0001" formControlName="ratePercent" /></label>
        <button type="submit" [disabled]="form.invalid">Добавить</button>
      </form>
      @if (error()) {
        <p class="err">{{ error() }}</p>
      }
    </section>
    <table>
      <thead>
        <tr>
          <th>С даты</th>
          <th>По дату</th>
          <th>Ставка</th>
        </tr>
      </thead>
      <tbody>
        @for (r of rows(); track r.id) {
          <tr>
            <td>{{ r.validFromDate | date: 'dd.MM.yyyy' }}</td>
            <td>{{ r.validToDate ? (r.validToDate | date: 'dd.MM.yyyy') : '—' }}</td>
            <td>{{ r.ratePercent }}</td>
          </tr>
        }
      </tbody>
    </table>
