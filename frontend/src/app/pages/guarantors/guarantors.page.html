    <h1>Поручители</h1>
    <p class="hint">Доступны только для договоров физлиц в статусе «Оформляется».</p>
    <section class="panel">
      <form [formGroup]="form" (ngSubmit)="add()" class="form-inline">
        <label
          >Договор
          <select formControlName="contractId">
            @for (c of draftPhysContracts(); track c.id) {
              <option [value]="c.id">{{ c.creditName }} — {{ c.clientDisplay }}</option>
            }
          </select>
        </label>
        <label
          >Поручитель (физлицо)
          <select formControlName="physPersonClientId">
            @for (p of phys(); track p.clientId) {
              <option [value]="p.clientId">{{ p.fullName }}, {{ p.passportSeries }} {{ p.passportNumber }}</option>
            }
          </select>
        </label>
        <button type="submit" [disabled]="form.invalid">Добавить</button>
      </form>

      @if (error()) {
        <p class="err">{{ error() }}</p>
      }
    </section>

    <table>
      <thead>
        <tr>
          <th>Кредит</th>
          <th>Поручитель</th>
          <th>Паспорт</th>
          <th></th>
        </tr>
      </thead>
      <tbody>
        @for (g of guarantors(); track g.internalId) {
          <tr>
            <td>{{ g.contractCreditName }}</td>
            <td>{{ g.guarantorFullName }}</td>
            <td>{{ g.passportSeries }} {{ g.passportNumber }}</td>
            <td><button type="button" (click)="remove(g)">Удалить</button></td>
          </tr>
        }
      </tbody>
    </table>
